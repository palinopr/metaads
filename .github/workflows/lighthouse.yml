name: Lighthouse Performance Audit

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    # Run performance audits daily at 3 AM UTC
    - cron: '0 3 * * *'

jobs:
  lighthouse:
    name: Lighthouse Performance Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Start application
        run: |
          npm start &
          npx wait-on http://localhost:3000 --timeout 60000

      - name: Run Lighthouse audit
        uses: treosh/lighthouse-ci-action@v10
        with:
          configPath: './lighthouserc.json'
          uploadArtifacts: true
          temporaryPublicStorage: true

      - name: Upload Lighthouse results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: lighthouse-results
          path: |
            .lighthouseci/
            lighthouse-results.json

      - name: Comment Lighthouse results on PR
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          recreate: true
          message: |
            ## ⚡ Lighthouse Performance Audit
            
            Performance audit completed! Check the artifacts for detailed results.
            
            ### Quick Metrics
            - **Performance**: Check detailed report
            - **Accessibility**: Check detailed report  
            - **Best Practices**: Check detailed report
            - **SEO**: Check detailed report
            
            [View detailed Lighthouse report](${{ steps.lighthouse.outputs.resultsUrl }})

      - name: Fail if performance score is below threshold
        run: |
          # Parse lighthouse results and fail if performance score < 90
          node -e "
            const fs = require('fs');
            const results = JSON.parse(fs.readFileSync('.lighthouseci/lhr-*.json', 'utf8'));
            const performanceScore = results.categories.performance.score * 100;
            console.log('Performance Score:', performanceScore);
            if (performanceScore < 90) {
              console.error('Performance score below threshold (90)');
              process.exit(1);
            }
          "