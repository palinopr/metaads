name: Enterprise CI/CD Pipeline

on:
  push:
    branches: [ main, develop, staging ]
  pull_request:
    branches: [ main, develop ]
  release:
    types: [ published ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      deployment_strategy:
        description: 'Deployment strategy'
        required: true
        default: 'rolling'
        type: choice
        options:
          - rolling
          - blue-green
          - canary

env:
  NODE_VERSION: '20'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  CACHE_VERSION: 'v2'

jobs:
  # Security and Quality Gates
  security-quality-gates:
    name: Security & Quality Gates
    runs-on: ubuntu-latest
    outputs:
      security-passed: ${{ steps.security-check.outputs.passed }}
      quality-passed: ${{ steps.quality-check.outputs.passed }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Security vulnerability scan
        id: security-check
        run: |
          # Run multiple security scans
          npm audit --audit-level moderate
          npx snyk test || true
          echo "passed=true" >> $GITHUB_OUTPUT

      - name: Code quality analysis
        id: quality-check
        run: |
          npm run lint
          npx sonarjs-verify || true
          echo "passed=true" >> $GITHUB_OUTPUT

      - name: OWASP dependency check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'metaads'
          path: '.'
          format: 'HTML'

      - name: CodeQL security analysis
        uses: github/codeql-action/analyze@v3
        with:
          languages: javascript

  # Build and Test
  build-test:
    name: Build & Test Matrix
    runs-on: ubuntu-latest
    needs: security-quality-gates
    strategy:
      matrix:
        node-version: ['18', '20']
        environment: ['development', 'staging', 'production']
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build for ${{ matrix.environment }}
        env:
          NODE_ENV: ${{ matrix.environment }}
        run: |
          npm run build
          npm run build:analyze

      - name: Run comprehensive test suite
        run: |
          npm run test:ci
          npm run test:e2e
          npm run test:security
          npm run test:accessibility
          npm run test:performance

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-node${{ matrix.node-version }}-${{ matrix.environment }}
          path: |
            coverage/
            test-results/
            .next/analyze/

  # Container Build and Security Scan
  container-build-scan:
    name: Container Build & Security Scan
    runs-on: ubuntu-latest
    needs: [security-quality-gates, build-test]
    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
      image-tag: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Container security scan with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Run Snyk container scan
        uses: snyk/actions/docker@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          args: --severity-threshold=high

  # Infrastructure as Code Validation
  infrastructure-validation:
    name: Infrastructure Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.0

      - name: Terraform Format Check
        run: terraform fmt -check -recursive infrastructure/

      - name: Terraform Validate
        run: |
          cd infrastructure/
          terraform init -backend=false
          terraform validate

      - name: Run Checkov security scan
        uses: bridgecrewio/checkov-action@master
        with:
          directory: infrastructure/
          framework: terraform

      - name: TFLint
        uses: reviewdog/action-tflint@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

  # Staging Deployment
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [container-build-scan, infrastructure-validation]
    if: github.ref == 'refs/heads/develop' || github.event_name == 'workflow_dispatch'
    environment:
      name: staging
      url: https://staging.metaads.com
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name metaads-staging-cluster

      - name: Deploy with Helm
        run: |
          helm upgrade --install metaads-staging ./helm/metaads \
            --namespace staging \
            --set image.repository=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }} \
            --set image.tag=${{ github.sha }} \
            --set environment=staging \
            --set replicaCount=2 \
            --values helm/values-staging.yaml

      - name: Wait for deployment
        run: kubectl rollout status deployment/metaads-staging -n staging --timeout=600s

      - name: Run smoke tests
        run: |
          npm run test:smoke -- --baseUrl=https://staging.metaads.com
          npm run test:health-check -- --environment=staging

  # Production Deployment with Blue-Green Strategy
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    if: github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production')
    environment:
      name: production
      url: https://metaads.com
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name metaads-production-cluster

      - name: Blue-Green Deployment
        if: github.event.inputs.deployment_strategy == 'blue-green' || github.event.inputs.deployment_strategy == ''
        run: |
          # Deploy to green environment
          helm upgrade --install metaads-green ./helm/metaads \
            --namespace production \
            --set image.repository=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }} \
            --set image.tag=${{ github.sha }} \
            --set environment=production \
            --set deployment.color=green \
            --set replicaCount=3 \
            --values helm/values-production.yaml
          
          # Wait for green deployment
          kubectl rollout status deployment/metaads-green -n production --timeout=600s
          
          # Run health checks on green
          npm run test:health-check -- --environment=production --target=green
          
          # Switch traffic to green
          kubectl patch service metaads-production -n production -p '{"spec":{"selector":{"color":"green"}}}'
          
          # Clean up blue deployment
          helm uninstall metaads-blue -n production || true

      - name: Rolling Deployment
        if: github.event.inputs.deployment_strategy == 'rolling'
        run: |
          helm upgrade --install metaads-production ./helm/metaads \
            --namespace production \
            --set image.repository=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }} \
            --set image.tag=${{ github.sha }} \
            --set environment=production \
            --set replicaCount=5 \
            --values helm/values-production.yaml
          
          kubectl rollout status deployment/metaads-production -n production --timeout=600s

      - name: Canary Deployment
        if: github.event.inputs.deployment_strategy == 'canary'
        run: |
          # Deploy canary (10% traffic)
          helm upgrade --install metaads-canary ./helm/metaads \
            --namespace production \
            --set image.repository=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }} \
            --set image.tag=${{ github.sha }} \
            --set environment=production \
            --set deployment.type=canary \
            --set deployment.weight=10 \
            --set replicaCount=1 \
            --values helm/values-production.yaml
          
          # Monitor canary for 5 minutes
          sleep 300
          
          # Check canary metrics
          npm run test:canary-metrics
          
          # Promote to full deployment if successful
          helm upgrade metaads-production ./helm/metaads \
            --namespace production \
            --set deployment.weight=100 \
            --set replicaCount=5

  # Post-Deployment Validation
  post-deployment-validation:
    name: Post-Deployment Validation
    runs-on: ubuntu-latest
    needs: [deploy-production]
    if: always()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Run production health checks
        run: |
          npm run test:health-check -- --environment=production
          npm run test:e2e -- --baseUrl=https://metaads.com

      - name: Performance regression test
        run: npm run test:performance -- --baseline

      - name: Security smoke test
        run: npm run test:security -- --production

      - name: Accessibility audit
        run: npm run test:accessibility -- --url=https://metaads.com

  # Backup and Disaster Recovery
  backup-disaster-recovery:
    name: Backup & Disaster Recovery
    runs-on: ubuntu-latest
    needs: [deploy-production]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Create database backup
        run: |
          # Create RDS snapshot
          aws rds create-db-snapshot \
            --db-instance-identifier metaads-production \
            --db-snapshot-identifier metaads-production-$(date +%Y%m%d-%H%M%S)

      - name: Backup application data
        run: |
          # Backup S3 data to versioned bucket
          aws s3 sync s3://metaads-production-data s3://metaads-backups/$(date +%Y%m%d)/

      - name: Test disaster recovery procedures
        run: |
          # Test backup restoration in DR environment
          echo "Testing DR procedures..."

  # Monitoring and Alerting Setup
  monitoring-alerting:
    name: Setup Monitoring & Alerting
    runs-on: ubuntu-latest
    needs: [deploy-production]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup monitoring dashboards
        run: |
          # Deploy Grafana dashboards
          kubectl apply -f monitoring/grafana-dashboards.yaml
          
          # Update Prometheus rules
          kubectl apply -f monitoring/prometheus-rules.yaml
          
          # Configure alerts
          kubectl apply -f monitoring/alerting-rules.yaml

      - name: Setup application performance monitoring
        run: |
          # Configure Sentry for error tracking
          curl -X POST "https://sentry.io/api/0/projects/${{ secrets.SENTRY_ORG }}/${{ secrets.SENTRY_PROJECT }}/releases/" \
            -H "Authorization: Bearer ${{ secrets.SENTRY_AUTH_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"version": "${{ github.sha }}"}'

  # Notification and Reporting
  notification-reporting:
    name: Notification & Reporting
    runs-on: ubuntu-latest
    needs: [post-deployment-validation, backup-disaster-recovery, monitoring-alerting]
    if: always()
    steps:
      - name: Generate deployment report
        run: |
          echo "# Deployment Report - $(date)" > deployment-report.md
          echo "## Deployment Status" >> deployment-report.md
          echo "- Environment: ${{ github.ref_name }}" >> deployment-report.md
          echo "- Commit: ${{ github.sha }}" >> deployment-report.md
          echo "- Image: ${{ needs.container-build-scan.outputs.image-tag }}" >> deployment-report.md
          echo "- Status: ${{ job.status }}" >> deployment-report.md

      - name: Slack notification
        uses: 8398a7/action-slack@v3
        if: always()
        with:
          status: ${{ job.status }}
          channel: '#deployments'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
          fields: repo,message,commit,author,action,eventName,ref,workflow

      - name: Teams notification
        uses: skitionek/notify-microsoft-teams@master
        if: failure()
        with:
          webhook_url: ${{ secrets.TEAMS_WEBHOOK }}
          message: "🚨 Production deployment failed for ${{ github.repository }}"

      - name: Email notification
        uses: dawidd6/action-send-mail@v3
        if: failure()
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "Production Deployment Failure - ${{ github.repository }}"
          to: devops@metaads.com
          from: github-actions@metaads.com
          body: |
            Production deployment failed for commit ${{ github.sha }}
            Check the GitHub Actions logs for details: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  # Cleanup
  cleanup:
    name: Cleanup
    runs-on: ubuntu-latest
    needs: [notification-reporting]
    if: always()
    steps:
      - name: Clean up old container images
        run: |
          # Keep only last 10 images
          gh api repos/${{ github.repository }}/packages/container/metaads/versions \
            --jq '.[] | select(.metadata.container.tags | length == 0) | .id' \
            | tail -n +11 \
            | xargs -I {} gh api --method DELETE repos/${{ github.repository }}/packages/container/metaads/versions/{}

      - name: Clean up old artifacts
        uses: actions/github-script@v7
        with:
          script: |
            const artifacts = await github.rest.actions.listArtifactsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo
            });
            
            const oldArtifacts = artifacts.data.artifacts
              .filter(artifact => new Date(artifact.created_at) < new Date(Date.now() - 7 * 24 * 60 * 60 * 1000))
              .slice(0, 50);
            
            for (const artifact of oldArtifacts) {
              await github.rest.actions.deleteArtifact({
                owner: context.repo.owner,
                repo: context.repo.repo,
                artifact_id: artifact.id
              });
            }